name: Helm Release

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"

jobs:
  release:
    name: Push Chart to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Package chart
        run: helm package charts/k8s-multitenant --destination .

      - name: Push chart to GHCR
        run: |
          CHART_VERSION=$(grep '^version:' charts/k8s-multitenant/Chart.yaml | awk '{print $2}')
          helm push k8s-multitenant-${CHART_VERSION}.tgz oci://ghcr.io/clouddrove
