{{- if .Values.tools.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.tools.namespace | quote }}
  labels:
    {{- include "multitenant.labels" . | nindent 4 }}
    multitenant.kubernetes.io/type: tools
  {{- with .Values.tools.labels }}
  {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with merge .Values.global.annotations .Values.tools.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
