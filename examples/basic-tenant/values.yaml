# Basic tenant example — single team, default resource tier, network isolation
# Usage:
#   helm install my-tenants k8s-multitenant/k8s-multitenant \
#     -f examples/basic-tenant/values.yaml \
#     -n platform-system --create-namespace

tools:
  create: true
  namespace: k8s-tools

tenants:
  - name: team-alpha
    labels:
      environment: staging
      cost-center: "eng-01"

rbac:
  create: true
  serviceAccountName: default

resourceQuota:
  enabled: true
  default:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    pods: "20"
    services: "5"
    persistentvolumeclaims: "5"
    secrets: "20"
    configmaps: "20"

limitRange:
  enabled: true
  default:
    type: Container
    default:
      cpu: 300m
      memory: 256Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    max:
      cpu: "1"
      memory: 2Gi
    min:
      cpu: 50m
      memory: 64Mi

networkPolicy:
  enabled: true
  vpcCidr: "10.0.0.0/8"
  allowInternetEgress: false
