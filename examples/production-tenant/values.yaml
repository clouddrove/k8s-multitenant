# Production-grade example — strict isolation, cost-allocation labels, higher quotas
# Usage:
#   helm install my-tenants k8s-multitenant/k8s-multitenant \
#     -f examples/production-tenant/values.yaml \
#     -n platform-system --create-namespace

global:
  labels:
    managed-by: platform-team
    compliance: pci-dss
  annotations:
    platform.io/owner: "platform-team@example.com"

tools:
  create: true
  namespace: k8s-tools

tenants:
  - name: payments-prod
    labels:
      environment: production
      cost-center: "fin-payments"
      data-classification: sensitive
      compliance: pci-dss
    annotations:
      contact: "payments-team@example.com"
      runbook: "https://wiki.example.com/payments-runbook"
    rbac:
      subjects:
        - kind: Group
          name: payments-team-lead
          apiGroup: rbac.authorization.k8s.io
        - kind: Group
          name: security-audit
          apiGroup: rbac.authorization.k8s.io
    # payments must not reach the internet — strict isolation
    networkPolicy:
      enabled: true

rbac:
  create: true
  serviceAccountName: default

resourceQuota:
  enabled: true
  default:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "50"
    services: "20"
    persistentvolumeclaims: "10"
    secrets: "100"
    configmaps: "100"

limitRange:
  enabled: true
  default:
    type: Container
    default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 200m
      memory: 256Mi
    max:
      cpu: "4"
      memory: 8Gi
    min:
      cpu: 50m
      memory: 64Mi

networkPolicy:
  enabled: true
  vpcCidr: "10.0.0.0/8"
  allowInternetEgress: false   # strict: no outbound internet for PCI workloads
